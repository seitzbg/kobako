services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kobako
      POSTGRES_PASSWORD: kobako
      POSTGRES_DB: kobako
    ports:
      - '5432:5432'
    volumes:
      - kobako_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kobako']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kobako_pgdata:
