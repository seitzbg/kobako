services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kobako}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-kobako}
    ports:
      - '5432:5432'
    volumes:
      - kobako_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-kobako}']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-kobako}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kobako}
      ORIGIN: ${ORIGIN:?ORIGIN must be set to the public URL, e.g. https://kobako.example.com (see .env.example)}
      PORT: 3000
    ports:
      - '${APP_PORT:-3000}:3000'
    restart: unless-stopped

volumes:
  kobako_pgdata:
